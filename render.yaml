services:
  - type: web
    name: miet-curriculum-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/programs
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DB_PATH
        value: /var/data/curriculum.db
    disks:
      - name: curriculum-data
        mountPath: /var/data
        sizeGB: 1
